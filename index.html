    window.handleLogin = (e) => {
      e.preventDefault();
      state.loginError = "";
      
      const un = document.getElementById('login-username').value;
      const pw = document.getElementById('login-password').value;
      const startNoInput = document.getElementById('login-start').value;
      const endNoInput = document.getElementById('login-end').value;

      let selectedBank = null;
      if (un === "SOAL PERTAMA" && pw === "mdmhalfalah") selectedBank = [...qBank1];
      else if (un === "SOAL KEDUA" && pw === "mdmhalfalah") selectedBank = [...qBank2];
      else if (un === "SOAL KETIGA" && pw === "mdmhalfalah") selectedBank = [...qBank3];

      if (selectedBank) {
        let finalBank = selectedBank;
        const start = parseInt(startNoInput);
        const end = parseInt(endNoInput);

        let startIdx = 0;
        let endIdx = selectedBank.length;

        if (!isNaN(start) && !isNaN(end) && start > 0 && end >= start && start <= selectedBank.length) {
          startIdx = start - 1;
          endIdx = Math.min(end, selectedBank.length);
        }

        finalBank = selectedBank.slice(startIdx, endIdx);

        try {
           localStorage.removeItem('cbt_history');
        } catch (e) {}
        state.history = null;

        state.questions = finalBank.map((q, i) => {
          let opts = [...q.options];
          if(!opts || opts.length === 0) {
              opts = ["A", "B", "C", "D"].map(o => ({text: `Pilihan ${o}`, isCorrect: false}));
              opts[0] = { text: q.answer, isCorrect: true };
          } else if (typeof opts[0] === 'string') {
              opts = opts.map(opt => ({ text: opt, isCorrect: opt === q.answer }));
          }
          opts = opts.sort(() => Math.random() - 0.5);
          return { ...q, options: opts, displayNo: startIdx + i + 1 };
        });
        
        state.username = un;
        state.isLoggedIn = true;
        state.currentIndex = 0;
        state.answers = {};
        state.doubtful = {};
        state.isFinished = false;
        state.isViewingHistory = false;
        renderApp();
        window.scrollTo(0, 0);
      } else {
        state.loginError = "Username atau Password salah!";
        renderApp();
      }
    };

    window.selectOption = (optIndex) => {
      const currentQ = state.questions[state.currentIndex];
      state.answers[state.currentIndex] = currentQ.options[optIndex].text;
      renderApp();
    };

    window.toggleDoubtful = () => {
      state.doubtful[state.currentIndex] = !state.doubtful[state.currentIndex];
      renderApp();
    };

    window.handleNext = () => {
      if (state.currentIndex < state.questions.length - 1) state.currentIndex++;
      renderApp();
      window.scrollTo(0, 0);
    };

    window.handlePrev = () => {
      if (state.currentIndex > 0) state.currentIndex--;
      renderApp();
      window.scrollTo(0, 0);
    };

    window.goToQuestion = (idx) => {
      state.currentIndex = idx;
      renderApp();
      window.scrollTo(0, 0);
    };

    window.handleFinish = () => {
      let correctCount = 0;
      state.questions.forEach((q, idx) => {
        if (state.answers[idx] === q.answer) correctCount++;
      });
      const finalScore = Math.round((correctCount / state.questions.length) * 100);
      state.score = finalScore;
      state.isFinished = true;
      state.showProfileMenu = false;
      state.showLogoutConfirm = false;
      state.isViewingHistory = false;

      const historyData = {
        score: finalScore,
        total: state.questions.length,
        date: new Date().toLocaleString('id-ID'),
        username: state.username,
        questions: state.questions,
        answers: state.answers
      };
      
      try {
         localStorage.setItem('cbt_history', JSON.stringify(historyData));
      } catch (e) {}
      
      state.history = historyData;

      renderApp();
      window.scrollTo(0, 0);
    };

      state.score = 0;

                 <div class="w-5 h-5 rounded bg-yellow-400 border border-yellow-500"></div>
                 <span>Ragu-ragu</span>
               </div>
               <div class="flex items-center gap-3">
                 <div class="w-5 h-5 rounded bg-gray-200 border border-gray-300 dark:bg-gray-700 dark:border-gray-600"></div>
                 <span>Belum Dijawab</span>
               </div>
            </div>
          </div>

        </main>

        <!-- FITUR AI TANYA PUTRI (OFFLINE) MENGGUNAKAN DESAIN BUTTON MODERN -->
        <button onclick="toggleChat()" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[80] group flex items-center justify-center transition-all active:scale-95 btn-ai-modern w-16 h-16 md:w-20 md:h-20 rounded-full" title="Tanya Putri">
            <span class="absolute -top-4 bg-yellow-400 text-emerald-900 text-[10px] md:text-xs font-black px-3 py-1 rounded-full border border-emerald-700 shadow-lg z-10 animate-bounce group-hover:bg-emerald-700 group-hover:text-yellow-400 transition-colors">TANYA PUTRI</span>
            <!-- Ikon Chat/Robot Bersih -->
            <svg class="w-8 h-8 md:w-10 md:h-10 text-yellow-300 transition-colors duration-300 group-hover:text-emerald-900" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
            </svg>
        </button>

        ${state.showChat ? `
          <div class="fixed bottom-24 right-4 md:right-10 z-[90] w-[calc(100%-2rem)] md:w-[350px] h-[480px] max-h-[75vh] bg-white dark:bg-gray-800 rounded-3xl shadow-2xl border-2 border-yellow-400 overflow-hidden flex flex-col transform transition-all origin-bottom-right">
             <!-- Header WA Style -->
             <div class="bg-emerald-600 px-4 py-3 flex items-center justify-between border-b-2 border-yellow-400 shadow-sm">
                <div class="flex items-center gap-3">
                   <div class="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center border-2 border-white text-emerald-700 shadow-sm overflow-hidden">
                      <img src="https://ui-avatars.com/api/?name=Putri&background=facc15&color=047857&bold=true" alt="Putri" class="w-full h-full object-cover">
                   </div>
                   <div class="flex flex-col">
                      <span class="text-white font-black text-sm tracking-wider leading-tight">PUTRI</span>
                      <span class="text-emerald-100 text-[10px] font-bold flex items-center gap-1">
                         <span class="w-1.5 h-1.5 bg-yellow-400 rounded-full animate-pulse"></span> Online
                      </span>
                   </div>
                </div>
                <button onclick="toggleChat()" class="text-emerald-100 hover:text-white transition-colors p-1.5 bg-emerald-700 hover:bg-emerald-500 rounded-full">
                   <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
             </div>
             
             <!-- Chat Messages -->
             <div id="chat-messages" class="flex-1 p-4 overflow-y-auto bg-emerald-50 dark:bg-gray-900 flex flex-col gap-3 relative scroll-smooth">
                ${state.chatHistory.map(msg => `
                   <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} w-full z-10">
                      <div class="max-w-[85%] rounded-2xl px-4 py-2.5 shadow-sm relative ${msg.role === 'user' ? 'bg-emerald-100 dark:bg-emerald-800 text-gray-800 dark:text-white rounded-br-sm border border-emerald-200 dark:border-emerald-700' : 'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 rounded-bl-sm border border-gray-200 dark:border-gray-700 shadow-md'}">
                         <p class="text-sm font-medium leading-relaxed whitespace-pre-wrap">${msg.parts[0].text}</p>
                      </div>
                   </div>
                `).join('')}
                ${state.isAILoading ? `
                   <div class="flex justify-start w-full z-10">
                      <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-bl-sm border border-gray-200 dark:border-gray-700 px-4 py-3 shadow-md flex items-center gap-1.5">
                         <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce"></div>
                         <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                         <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                      </div>
                   </div>
                ` : ''}
             </div>

             <!-- Input Area -->
             <div class="bg-white dark:bg-gray-900 px-3 py-3 border-t border-gray-200 dark:border-gray-700 flex items-center gap-2">
                <form onsubmit="sendChatMessage(event)" class="w-full flex gap-2">
                   <input type="text" id="chat-input" onchange="handleChatInput(event)" value="${state.chatInput || ''}" placeholder="Ketik pesan..." class="flex-1 rounded-full px-4 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none dark:text-white text-sm transition-all" autocomplete="off" ${state.isAILoading ? 'disabled' : ''}>
                   <button type="submit" class="w-10 h-10 rounded-full bg-emerald-600 text-white flex items-center justify-center flex-shrink-0 hover:bg-emerald-500 transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed" ${state.isAILoading ? 'disabled' : ''}>
                      <svg class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                   </button>
                </form>
             </div>
          </div>
        ` : ''}

        ${state.showProfileMenu ? `
          <div class="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
             <div class="w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden transform transition-all bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
                <div class="p-4 flex justify-between items-center border-b bg-gray-50 dark:bg-gray-900 border-gray-200 dark:border-gray-700">
                   <h3 class="font-black text-lg tracking-wide text-gray-800 dark:text-white uppercase">Menu Peserta</h3>
                   <button onclick="closeProfileMenu()" class="p-1.5 rounded-md hover:bg-red-100 hover:text-red-500 transition-colors text-gray-500 dark:text-gray-400">
                      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                   </button>
                </div>
                <div class="p-6 space-y-4">
                   <button onclick="openLogoutConfirm()" class="w-full py-4 px-4 bg-red-500 hover:bg-red-600 text-white font-black tracking-wide rounded-xl shadow-md flex items-center justify-center gap-2 transition-transform transform active:scale-95">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                      KEMBALI KE BERANDA
                   </button>
                   <button onclick="closeProfileMenu()" class="w-full py-4 px-4 font-black tracking-wide rounded-xl shadow-sm flex items-center justify-center gap-2 transition-transform transform active:scale-95 bg-gray-200 text-gray-800 hover:bg-gray-300 dark:bg-gray-700 dark:text-white dark:hover:bg-gray-600">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                      LANJUT MENGERJAKAN
                   </button>
                </div>
             </div>
          </div>
        ` : ''}

        ${state.showLogoutConfirm ? `
          <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
             <div class="w-full max-w-sm p-6 rounded-3xl shadow-2xl bg-white dark:bg-gray-800 text-center border-t-8 border-red-500 transform transition-all scale-105">
                <div class="w-20 h-20 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                  <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                </div>
                <h3 class="text-2xl font-black mb-2 text-gray-900 dark:text-white uppercase tracking-wider">Peringatan!</h3>
                <p class="text-gray-600 dark:text-gray-300 font-medium mb-8 text-sm md:text-base leading-relaxed">Apakah Anda yakin ingin keluar? <br/> Progress yang belum di-<strong>Selesai</strong>-kan akan hilang tanpa tersimpan.</p>
                <div class="flex flex-col sm:flex-row gap-3">
                   <button onclick="closeLogoutConfirm()" class="flex-1 py-4 bg-gray-200 hover:bg-gray-300 text-gray-800 dark:bg-gray-700 dark:hover:bg-gray-600 dark:text-white font-black rounded-xl transition-colors shadow-sm">BATAL</button>
                   <button onclick="handleLogout()" class="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white font-black rounded-xl shadow-md transition-colors">YA, KELUAR</button>
                </div>
             </div>
          </div>
        ` : ''}
      `;
    }

    // Event listener untuk mencegah reload halaman tidak disengaja
    window.addEventListener('beforeunload', function (e) {
      if (state.isLoggedIn && !state.isFinished && !state.isViewingHistory) {
        // Tampilkan prompt bawaan browser untuk mencegah hilangnya progress
        e.preventDefault();
        e.returnValue = ''; 
      }
    });

    document.addEventListener('DOMContentLoaded', renderApp);
  </script>
</body>
</html>
